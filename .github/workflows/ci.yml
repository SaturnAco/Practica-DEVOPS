name: CI

on: push

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Check code errors
        run: uv run python -m ruff check . --fix

      - name: Check formatting
        run: uv run python -m ruff format . --check

      - name: Run unit tests
        run: uv run python -m pytest ./core/tests/unit

      - name: Run integration tests
        run: uv run python -m pytest ./core/tests/integration

      - name: Run BDD tests
        run: uv run python -m pytest ./core/tests/behaviour